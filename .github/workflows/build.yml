name: Build APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    
    - uses: actions/setup-node@v2
      with:
        node-version: '18'
        
    # Fix JSON BOM
    - name: Fix JSON Files
      run: |
        for file in package.json app.json; do
          if [ -f "$file" ]; then
            sed -i '1s/^\xEF\xBB\xBF//' "$file"
            echo "Cleaned $file"
          fi
        done
    
    - name: Install Dependencies
      run: npm install

    - name: Install Expo CLI (Legacy)
      run: npm install -g expo-cli

    - name: Build Android APK (Legacy)
      run: expo build:android --type apk --non-interactive
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    
    # Upload the APK so you can download it from the GitHub Actions summary
    - name: Upload APK
      uses: actions/upload-artifact@v2
      with:
        name: app-apk
        path: NoCima-1.0.0.apk
