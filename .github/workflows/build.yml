name: Build Android APK

on:
  push:
    branches: [launch-fix]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Clear JVM env vars
        run: |
          echo "JAVA_TOOL_OPTIONS=" >> $GITHUB_ENV
          echo "_JAVA_OPTIONS=" >> $GITHUB_ENV
          echo "JDK_JAVA_OPTIONS=" >> $GITHUB_ENV

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        env:
          SKIP_JDK_VERSION_CHECK: true

      - name: Install NDK
        run: sdkmanager --install "ndk;23.1.7779620"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Check mmkv version
        run: cat node_modules/react-native-mmkv/package.json | grep '"version"'

      - name: Verify RN Gradle plugin path
        run: |
          if [ -d "node_modules/react-native/node_modules/@react-native/gradle-plugin" ]; then
            echo "✓ Found at node_modules/react-native/node_modules/@react-native/gradle-plugin"
          elif [ -d "node_modules/@react-native/gradle-plugin" ]; then
            echo "✓ Found at node_modules/@react-native/gradle-plugin"
            echo "WARNING: settings.gradle path may need updating"
          else
            echo "✗ gradle-plugin not found in either location"
            find node_modules -name "gradle-plugin" -type d 2>/dev/null || true
            exit 1
          fi

      - name: Clean stale Android build cache
        run: |
          rm -rf android/.gradle
          rm -rf android/app/.cxx
          rm -rf android/app/build
          rm -rf ~/.gradle/caches/transforms-*

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build Release APK
        working-directory: android
        env:
          JAVA_TOOL_OPTIONS: ""
          _JAVA_OPTIONS: ""
          JDK_JAVA_OPTIONS: ""
          CMAKE_JAVA_TOOL_OPTIONS: ""
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbdoBest-APK
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}