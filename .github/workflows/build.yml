name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      JAVA_TOOL_OPTIONS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"
      _JAVA_OPTIONS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"
      GRADLE_OPTS: ""

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📋 Install Node dependencies
        run: npm ci

      - name: 🔍 Debug: Check paths
        run: |
          echo "=== Repo root contents ==="
          ls -la
          echo "=== node_modules/@react-native exists? ==="
          ls -d node_modules/@react-native 2>/dev/null && echo "YES" || echo "NO"
          echo "=== gradle-plugin exists? ==="
          ls -d node_modules/@react-native/gradle-plugin 2>/dev/null && echo "YES" || echo "NO"
          echo "=== Full path ==="
          echo "$(pwd)/node_modules/@react-native/gradle-plugin"
          echo "=== settings.gradle path test ==="
          GRADLE_PLUGIN="$(pwd)/node_modules/@react-native/gradle-plugin"
          if [ -d "$GRADLE_PLUGIN" ]; then
            echo "EXISTS: $GRADLE_PLUGIN"
            ls "$GRADLE_PLUGIN/settings-plugin/src/main/kotlin/com/facebook/react/"
          else
            echo "MISSING: $GRADLE_PLUGIN"
            echo "=== What's in @react-native? ==="
            ls node_modules/@react-native/
          fi

      - name: 🐘 Setup Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: 🏗️ Build Release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbdoBest-APK
          path: android/app/build/outputs/apk/release/*.apk

      - name: 🚀 Create Release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
