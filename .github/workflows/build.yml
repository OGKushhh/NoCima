name: Build Android APK

on:
  push:
    branches: [main, video-download-update]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm install

      - name: Clean and Build APK
        working-directory: android
        run: |
          # Remove any problematic jvmargs from gradle.properties
          sed -i '/org.gradle.jvmargs/d' gradle.properties 2>/dev/null || true
          # Override the environment variables that cause the -Xmx64m error
          export JAVA_TOOL_OPTIONS="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
          export _JAVA_OPTIONS=""
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbdoBest-APK
          path: android/app/build/outputs/apk/release/*.apk