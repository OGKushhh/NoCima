name: Build Android APK

on:
  push:
    branches: [main, video-download-update]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Explicitly unset all problematic environment variables
      JAVA_TOOL_OPTIONS: ""
      _JAVA_OPTIONS: ""
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm install

      - name: Clean and Build
        working-directory: android
        run: |
          # Remove any jvmargs from gradle.properties
          sed -i '/org.gradle.jvmargs/d' gradle.properties 2>/dev/null || true
          # Use the wrapper and force JVM args via command line
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon -Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbdoBest-APK
          path: android/app/build/outputs/apk/release/*.apk