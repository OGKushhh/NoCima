name: Build Android APK

on:
  push:
    branches: [main, video-download-update]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Clear the problematic Java options
      JAVA_TOOL_OPTIONS: ""
      _JAVA_OPTIONS: ""

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Clean and Build
        working-directory: android
        run: |
          # Remove any jvmargs from gradle.properties
          sed -i '/org.gradle.jvmargs/d' gradle.properties 2>/dev/null || true
          # Use the system gradle (not wrapper) with explicit JVM args
          gradle clean assembleRelease --no-daemon -Dorg.gradle.jvmargs=-Xmx4096m

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbdoBest-APK
          path: android/app/build/outputs/apk/release/*.apk