# Memory and Performance
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true

# Architecture Settings
newArchEnabled=false
hermesEnabled=true

# Kotlin Downgrade Fix (Ensures 1.8.22 consistency)
kotlinVersion=1.8.22

# Nitro & MMKV Fixes
# This prevents the 'compileReleaseKotlin' failure by skipping 
# New Arch codegen since you have newArchEnabled=false.
MMKV_SKIP_CODEGEN=true

# Improves build speed for Nitro C++ compilation
android.defaults.buildfeatures.buildconfig=true
android.nonTransitiveRClass=true