apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native Configuration
 */
react {
    /* * Automatically link libraries. This handles Nitro and MMKV registration.
     */
    autolinkLibrariesWithApp()
}

/**
 * MMKV & Nitro Architecture Fix
 * Since newArchEnabled=false, we must skip codegen to avoid Kotlin compiler crashes.
 */
project.ext.set("MMKV_SKIP_CODEGEN", true)

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    compileSdk 35
    namespace "com.abdobest" [cite: 2]

    defaultConfig {
        applicationId "com.abdobest" [cite: 2]
        minSdkVersion 24 [cite: 2]
        targetSdkVersion 34 [cite: 2]
        versionCode 1 [cite: 2]
        versionName "1.0" [cite: 2]

        // Fix for the BuildConfig deprecation warning in AGP 8+
        buildFeatures {
            buildConfig = true
        }

        // Nitro Modules require C++20 for JSI support
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++20"
            }
        }
    }

    // Matches the NDK version in your GitHub Actions runner
    ndkVersion = "26.1.10909125"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore') [cite: 3]
            storePassword 'android' [cite: 3]
            keyAlias 'androiddebugkey' [cite: 3]
            keyPassword 'android' [cite: 3]
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug [cite: 4]
        }
        release {
            signingConfig signingConfigs.debug [cite: 4]
            minifyEnabled enableProguardInReleaseBuilds [cite: 2]
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro" [cite: 2]
        }
    }

    packagingOptions {
        // Prevents duplicate library conflicts between Nitro/MMKV and React Native
        pickFirst '**/libc++_shared.so'
    }
}

// Ensure the Kotlin 1.8.22 downgrade is applied consistently
configurations.all {
    resolutionStrategy {
        force "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion" [cite: 5]
        force "org.jetbrains.kotlin:kotlin-reflect:$kotlinVersion" [cite: 5]
        force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlinVersion"
    }
}

dependencies {
    implementation("com.facebook.react:react-android") [cite: 2]

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android") [cite: 2]
    } else {
        implementation jscFlavor [cite: 2]
    }
}